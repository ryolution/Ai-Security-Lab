id: agent-example
type: agent-http
description: Example tool-using agent target.

authorization:
  confirmed: false
  note: "Use a dedicated test agent with no production credentials."

connection:
  endpoint: "https://agent.example.com/run"
  method: POST
  api_key_env: "AGENT_API_KEY"
  timeout_seconds: 45

capabilities:
  - chat
  - tools
  - tool_trace

tools:
  allowed:
    - search_docs
    - summarize
  forbidden:
    - execute_shell
    - read_environment_secrets
    - send_external_request

limits:
  max_requests: 10
  max_tool_calls: 5
  max_tokens: 3000
  max_runtime_seconds: 90

redaction:
  enabled: true
