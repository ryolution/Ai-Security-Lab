id: local-ollama-example
type: ollama
description: Example local Ollama target.

authorization:
  confirmed: false
  note: "Only run against local models you control."

connection:
  base_url: "http://127.0.0.1:11434"
  model: "llama3.1"
  timeout_seconds: 45

capabilities:
  - chat

limits:
  max_requests: 20
  max_tokens: 2000
  max_runtime_seconds: 120

redaction:
  enabled: true
